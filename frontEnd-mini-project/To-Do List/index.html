<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#4e54c8,#8f94fb);
      padding:20px;
    }

    .todo-container{
      width:100%;
      max-width:400px;
      background:white;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .input-box input{
      flex:1;
      padding:12px;
      border:2px solid #ddd;
      border-radius:10px;
      outline:none;
      font-size:16px;
    }

    .input-box button{
      padding:12px 18px;
      border:none;
      background:#4e54c8;
      color:white;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .input-box button:hover{
      background:#373cc0;
    }

    ul{
      list-style:none;
    }

    li{
      background:#f4f4f4;
      padding:12px;
      border-radius:10px;
      margin-bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      word-break:break-word;
    }

    .task-text.completed{
      text-decoration:line-through;
      color:gray;
    }

    .buttons{
      display:flex;
      gap:8px;
    }

    .complete-btn{
      background:#28a745;
      color:white;
      border:none;
      padding:7px 10px;
      border-radius:8px;
      cursor:pointer;
    }

    .delete-btn{
      background:#dc3545;
      color:white;
      border:none;
      padding:7px 10px;
      border-radius:8px;
      cursor:pointer;
    }

    @media(max-width:450px){

      .input-box{
        flex-direction:column;
      }

      .input-box button{
        width:100%;
      }

      li{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }

      .buttons{
        width:100%;
      }

      .buttons button{
        flex:1;
      }
    }
  </style>
</head>

<body>

  <div class="todo-container">
    <h1>Todo List</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter your task">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>

    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    function addTask(){

      if(taskInput.value.trim() === ""){
        alert("Please enter a task");
        return;
      }

      const li = document.createElement("li");

      li.innerHTML = `
        <span class="task-text">${taskInput.value}</span>

        <div class="buttons">
          <button class="complete-btn" onclick="completeTask(this)">
            Done
          </button>

          <button class="delete-btn" onclick="deleteTask(this)">
            Delete
          </button>
        </div>
      `;

      taskList.appendChild(li);

      taskInput.value = "";
    }

    function deleteTask(button){
      button.parentElement.parentElement.remove();
    }

    function completeTask(button){
      const taskText =
      button.parentElement.parentElement.querySelector(".task-text");

      taskText.classList.toggle("completed");
    }

  </script>

</body>
</html>
