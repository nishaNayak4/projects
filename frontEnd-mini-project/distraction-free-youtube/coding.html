<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding | DF Youtube</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    .back-btn{
      display:inline-block;
      margin-bottom:30px;
      padding:10px 18px;
      background:#38bdf8;
      color:white;
      border-radius:10px;
      text-decoration:none;
      transition:0.3s;
    }

    .back-btn:hover{
      background:#0ea5e9;
    }

    .video-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
    }

    iframe{
      width:100%;
      height:250px;
      border:none;
      border-radius:15px;
      transition:0.3s;
    }

    iframe:hover{
      transform:scale(1.03);
    }

  </style>
</head>

<body>

  <h1>Coding Videos</h1>

  <a href="distraction_free_youtube.html" class="back-btn">
    ← Go Back
  </a>

  <div class="video-container">

    <iframe 
    src="https://www.youtube.com/embed/irqbmMNs2Bo?si=ZsdatWd9WDKANjPT"
    allowfullscreen></iframe>

    <iframe 
    src="https://www.youtube.com/embed/rQoqCP7LX60?si=qJDQwue38s4YXjh7"
    allowfullscreen></iframe>

    <iframe 
    src="https://www.youtube.com/embed/0HyIda5eub8?si=QYwulCrb5_a6jFOa"
    allowfullscreen></iframe>

  </div>

</body>
</html>
